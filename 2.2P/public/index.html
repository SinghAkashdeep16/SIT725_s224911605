<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SIT725 - Task 2.2P Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 22px; }
    input, select, button { padding: 8px; margin: 5px 0; font-size: 14px; }
    input { width: 100px; }
    #result { margin-top: 20px; font-weight: bold; }
    .row { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>SIT725 Task 2.2P - Express Calculator</h1>

  <div class="row">
    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">
    <select id="operation">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
      <option value="multiply">Multiply</option>
      <option value="divide">Divide</option>
    </select>
    <button onclick="calculate()">Calculate</button>
  </div>

  <div id="result"></div>

  <script>
    async function calculate() {
      const num1 = document.getElementById('num1').value;
      const num2 = document.getElementById('num2').value;
      const operation = document.getElementById('operation').value;
      const resultDiv = document.getElementById('result');

      try {
        const url = operation === 'add'
          ? `/add?a=${num1}&b=${num2}`
          : `/${operation}?num1=${num1}&num2=${num2}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.error) {
          resultDiv.textContent = 'Error: ' + data.error;
        } else {
          const x = data.a !== undefined ? data.a : data.num1;
          const y = data.b !== undefined ? data.b : data.num2;
          resultDiv.textContent = `${x} ${data.operation} ${y} = ${data.result}`;
        }
      } catch (err) {
        resultDiv.textContent = 'Error calling server: ' + err.message;
      }
    }
  </script>
</body>
</html>
